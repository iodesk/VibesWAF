worker_processes auto;
# Each connection uses FDs for the client socket + the upstream socket. With
# worker_connections 2048 and proxying, the worker can need several thousand
# FDs — the default ulimit (1024) is the cause of "Too many open files" under
# load. Raise the per-worker FD limit well above worker_connections × 2.
worker_rlimit_nofile 65535;
error_log /var/log/openresty/error.log warn;
pid logs/nginx.pid;
user openresty;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

# Stream block untuk TCP/UDP proxy
stream {
    include /etc/openresty/stream.d/*.conf;
}

http {
    include mime.types;
    default_type application/octet-stream;

    # Security
    server_tokens off;
    port_in_redirect off;

    # Performance (Nginx → client)
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_names_hash_bucket_size 128;

    # Client limits
    client_body_buffer_size 128K;
    client_header_buffer_size 128k;
    client_max_body_size 64M;
    large_client_header_buffers 4 128k;

    # SSL Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache builtin:1000 shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_ciphers EECDH+AESGCM:EDH+AESGCM;
    ssl_prefer_server_ciphers on;
    ssl_stapling off;
    ssl_stapling_verify off;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/openresty/access.log main;

    # Shared dictionaries
    lua_shared_dict cert_cache 50m;

    # Cloudflare Real IP
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;

    real_ip_header CF-Connecting-IP;
    real_ip_recursive on;

    lua_package_path "/etc/openresty/lua.d/?.lua;;";

    # Backend Go service (dumb pipe — Go handles all logic)
    upstream waf_backend {
        server 127.0.0.1:3044;
        keepalive 64;
    }

    # Reject direct IP access (HTTP)
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;
        return 444;
    }

    # Reject direct IP access (HTTPS)
    server {
        listen 443 default_server ssl;
        listen [::]:443 default_server ssl;
        http2 on;
        server_name _;
        ssl_reject_handshake on;
        return 444;
    }

    # HTTP — ACME challenge + redirect to HTTPS
    server {
        listen 80;
        server_name ~.;

        location /.well-known/acme-challenge/ {
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_pass http://127.0.0.1:8080;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS — pass everything to Go
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name ~.;

        ssl_certificate     /opt/certs/default/fullchain.pem;
        ssl_certificate_key /opt/certs/default/key.pem;
        ssl_certificate_by_lua_file /etc/openresty/lua.d/ssl.lua;

        ssl_client_hello_by_lua_block {
            local ok, ja4 = pcall(require, "resty.ja4")
            if ok then
                ja4.configure({ hash = true })
                ja4.compute()
            end
        }

        set $ja4_fingerprint "";
        set $ja4h_fingerprint "";

        access_by_lua_block {
            local ok, ja4 = pcall(require, "resty.ja4")
            if ok then
                local tls_fp = ja4.get()
                if tls_fp then
                    ngx.var.ja4_fingerprint = tls_fp
                end
            end

            local ok2, ja4h = pcall(require, "resty.ja4h")
            if ok2 then
                ja4h.configure({ hash = true })
                local http_fp = ja4h.compute()
                if http_fp then
                    ngx.var.ja4h_fingerprint = http_fp
                end
            end
        }

        location / {
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-JA4 $ja4_fingerprint;
            proxy_set_header X-JA4H $ja4h_fingerprint;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_buffering off;
            proxy_request_buffering off;

            proxy_connect_timeout 3s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;

            proxy_pass http://waf_backend;
        }
    }

    # WebSocket upgrade map
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }
}
